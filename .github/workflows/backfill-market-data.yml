name: 回填历史A股日行情

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "开始日期 YYYY-MM-DD"
        required: true
        default: "2026-01-01"
        type: string
      end_date:
        description: "结束日期 YYYY-MM-DD"
        required: true
        type: string
      force:
        description: "覆盖已有文件"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: market-data-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: 回填历史数据
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
          INPUT_FORCE: ${{ inputs.force }}
        run: |
          FORCE_ARG=""
          if [ "$INPUT_FORCE" = "true" ]; then FORCE_ARG="--force"; fi
          python scripts/backfill_market_data.py --start "$START_DATE" --end "$END_DATE" $FORCE_ARG
          python scripts/validate_data.py
      - name: 提交历史数据
        run: |
          if git diff --quiet -- data; then
            echo "没有新数据"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "data: backfill A-share market data ${{ inputs.start_date }} to ${{ inputs.end_date }}"
          git push
