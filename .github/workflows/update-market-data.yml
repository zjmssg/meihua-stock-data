name: 更新A股日行情

on:
  schedule:
    - cron: "35 18 * * 1-5"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
    inputs:
      trade_date:
        description: "指定交易日，留空则自动选择最近已收盘交易日（YYYY-MM-DD）"
        required: false
        type: string
      force:
        description: "覆盖已有文件"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: market-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: 下载并校验行情
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          INPUT_DATE: ${{ inputs.trade_date }}
          INPUT_FORCE: ${{ inputs.force }}
        run: |
          DATE_ARG="${INPUT_DATE:-auto}"
          FORCE_ARG=""
          if [ "$INPUT_FORCE" = "true" ]; then FORCE_ARG="--force"; fi
          python scripts/update_market_data.py --date "$DATE_ARG" $FORCE_ARG
          python scripts/validate_data.py
      - name: 提交数据文件
        run: |
          if git diff --quiet -- data; then
            echo "没有新数据"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "data: update A-share daily market data"
          git push
